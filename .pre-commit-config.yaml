# =========================================================================================== #
# pre-commit configuration — https://pre-commit.com                                           #
# Install: pre-commit install --install-hooks                                                 #
# Run manually: pre-commit run --all-files                                                    #
# =========================================================================================== #

minimum_pre_commit_version: "4.0.0"

default_stages: [pre-commit, pre-push]

repos:

  # ========================================================================================= #
  # General Hygiene                                                                           #
  # ========================================================================================= #
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # ========================================================================================= #
  # Secret Detection                                                                          #
  # ========================================================================================= #
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks

  # ========================================================================================= #
  # Terraform / HCL Formatting                                                                #
  # ========================================================================================= #
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.0
    hooks:
      - id: terraform_fmt
        args:
          - --args=-write=true
          - --args=-recursive

  # ========================================================================================= #
  # YAML Linting                                                                              #
  # ========================================================================================= #
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.0
    hooks:
      - id: yamllint
        args: [-c, .config/.yamllint.yaml]

  # ========================================================================================= #
  # Markdown Linting                                                                          #
  # ========================================================================================= #
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.44.0
    hooks:
      - id: markdownlint
        args: [--config, .config/.markdownlint.json]

  # ========================================================================================= #
  # Conventional Commits                                                                      #
  # ========================================================================================= #
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.0.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [feat, fix, docs, ci, chore, refactor, security]
