name: Bug Report
description: Report a deployment failure or misconfiguration.
labels: ["bug"]
assignees:
  - NWarila

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Please provide as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error Output
      description: Paste the relevant Terraform or GitHub Actions error output.
      render: shell
    validations:
      required: false

  - type: input
    id: workflow-run
    attributes:
      label: GitHub Actions Run URL
      description: Link to the failed workflow run, if applicable.
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      options:
        - terraforms.tfvars (VM configuration)
        - GitHub Actions workflow
        - cloud-init / OS configuration
        - Proxmox / infrastructure
        - Tooling / pre-commit
        - Documentation
        - Other
    validations:
      required: true
